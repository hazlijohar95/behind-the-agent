name: Deploy to Cloudflare

# Reliable deploy path for this Bun-workspace + Turborepo monorepo (the one-click
# "Deploy to Cloudflare" button can struggle with shared workspace packages).
#
# To enable, in GitHub → Settings → Secrets and variables → Actions:
#   • Variable:  ENABLE_DEPLOY = true
#   • Secrets:   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
#                VITE_SUPABASE_URL, VITE_SUPABASE_PUBLISHABLE_KEY, VITE_APP_URL
# Server-only secrets (SUPABASE_SECRET_KEY, MUX_*, POLAR_*, CRON_SECRET) are set
# once in Cloudflare with `wrangler secret put` — they are runtime, not build-time.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    # Stays dormant on forks/templates until ENABLE_DEPLOY is set, so it never
    # produces red failing runs before credentials are configured.
    if: ${{ vars.ENABLE_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      # Wrangler requires Node 22+.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: bun install --frozen-lockfile

      - name: Build and deploy
        working-directory: apps/web
        run: bun run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # VITE_* are inlined into the browser bundle at BUILD time, so they
          # must be present here (publishable values only — never the secret key).
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL }}
